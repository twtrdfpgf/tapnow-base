<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>taopipi - AI 画布平台</title>
    <meta name="description" content="taopipi - 免费 AI 画布平台，支持图片生成、视频创作" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* CSS Variables for Theme Support */
      :root {
        --color-bg: #F5F7FA;
        --color-text: #1f2937;
        --color-text-secondary: #6b7280;
        --color-border: #e5e7eb;
        --color-surface: #ffffff;
        --color-scrollbar: #d1d5db;
        --color-scrollbar-hover: #9ca3af;
        --color-grid: #E4E4E7;
      }
      
      .dark {
        --color-bg: #0B0C0E;
        --color-text: #E4E4E7;
        --color-text-secondary: #9ca3af;
        --color-border: #27272a;
        --color-surface: #18181b;
        --color-scrollbar: #3f3f46;
        --color-scrollbar-hover: #52525b;
        --color-grid: #1a1a1f;
      }
      
      body { 
        margin: 0; 
        padding: 0; 
        overflow: hidden; 
        background-color: var(--color-bg, #F5F7FA); 
        font-family: "Inter", "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
        color: var(--color-text, #1f2937);
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        transition: background-color 0.2s ease, color 0.2s ease;
      }
      
      /* Custom scrollbar - Light theme default */
      .node-scroll::-webkit-scrollbar, .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
      .node-scroll::-webkit-scrollbar-track, .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .node-scroll::-webkit-scrollbar-thumb, .custom-scrollbar::-webkit-scrollbar-thumb { 
        background: var(--color-scrollbar, #d1d5db); 
        border-radius: 6px; 
      }
      .node-scroll::-webkit-scrollbar-thumb:hover, .custom-scrollbar::-webkit-scrollbar-thumb:hover { 
        background: var(--color-scrollbar-hover, #9ca3af); 
      }
      
      /* Grid pattern for canvas */
      .grid-pattern {
        background-size: 20px 20px;
        background-image: radial-gradient(var(--grid-color, #E4E4E7) 1px, transparent 1px);
      }
      
      /* Hide scrollbar */
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      
      /* Animation utilities */
      @keyframes shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }
      .animate-shimmer {
        background: linear-gradient(90deg, transparent, rgba(0,0,0,0.03), transparent);
        background-size: 200% 100%;
        animation: shimmer 2s infinite;
      }
      .dark .animate-shimmer {
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
        background-size: 200% 100%;
      }
      
      /* Focus ring utilities */
      .focus-ring {
        outline: none;
      }
      .focus-ring:focus-visible {
        box-shadow: 0 0 0 2px var(--color-bg), 0 0 0 4px #3b82f6;
      }
      
      /* Smooth transitions for interactive elements */
      button, a, input, select, textarea {
        transition: all 0.15s ease;
      }
    </style>
    
    <!-- Inter Font for better typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
